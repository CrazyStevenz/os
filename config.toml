[[icedos.repositories]]
url = "github:icedos/apps"
modules = [
  "aagl",
  "bash",
  "btop",
  "celluloid",
  "codium",
  "gamemode",
  "gamescope",
  "helium",
  "kitty",
  "lact",
  "lsfg-vk",
  "mangohud",
  "nautilus",
  "podman",
  "proton-launch",
  # "scx",
  # "solaar",
  "steam",
  "sunshine",
  "tailscale",
  "walker",
  "zenergy",
]

[[icedos.repositories]]
url = "github:icedos/desktop"

[[icedos.repositories]]
url = "github:icedos/gnome"
fetchOptionalDependencies = true

[icedos.applications.codium.users.stef]
autoSave = "onFocusChange"
colorTheme = "One Dark Pro Darker"
formatOnPaste = false
fontSize = 14

[icedos.applications.codium.users.work]
autoSave = "onFocusChange"
formatOnPaste = false

[icedos.applications.git.users.stef]
username = "CrazyStevenz"
email = "github.ekta@aleeas.com"

[icedos.applications.git.users.work]
username = "CrazyStevenz"
email = "github.ekta@aleeas.com"

[icedos.applications.mangohud]
fpsLimit = "165,144,120,90,60,30,0"

[icedos.applications.nh.gc]
days = 7 # Number of days before a generation can be deleted
generations = 5 # Number of generations that will always be kept

# [icedos.applications.scx]
# extraArgs = ["--perf", "1024"]

[icedos.applications.steam]
beta = true
cpuUsageWorkaround = true
downloadsWorkaround = true

[icedos.applications.sunshine]
autoStart = true

[icedos.desktop]
defaultBrowser = "helium.desktop"
defaultEditor = "codium.desktop"

[[icedos.desktop.entries]]
id = "librewolf" # Firefox privacy flavor
name = "Librewolf"
exec = "icedos pkgs run librewolf"
icon = "librewolf"

[[icedos.desktop.entries]]
id = "mousai" # Song recognizer
name = "Mousai"
exec = "icedos pkgs run mousai"
icon = "mousai"

[[icedos.desktop.entries]]
id = "newsflash" # RSS reader
name = "Newsflash"
exec = "icedos pkgs run newsflash"
icon = "newsflash"

[icedos.desktop.gnome]
excludeDefaultPackages = [
  "gnome-text-editor", # Text editor
  "papers", # Document viewer
  "seahorse", # Encryption key and password manager UI
  "showtime", # New video player
  "sushi", # File previewer
]

[icedos.applications.zsh.aliases]
i = "icedos"
ir = "icedos rebuild"
iu = "icedos rebuild --update"

[icedos.desktop.gnome.extensions]
arcmenu = true
dashToPanel = true

[icedos.desktop.gnome.users.stef.pinnedApps.arcmenu]
enable = true
list = ["codium.desktop", "org.nicotine_plus.Nicotine.desktop", "spek.desktop"]

[icedos.desktop.gnome.users.stef.pinnedApps.shell]
enable = true
list = ["steam.desktop", "signal.desktop", "helium.desktop"]

[icedos.desktop.gnome.users.work.pinnedApps.arcmenu]
enable = true
list = ["codium.desktop"]

[icedos.desktop.gnome.users.work.pinnedApps.shell]
enable = true
list = ["slack.desktop", "signal.desktop", "helium.desktop", "webstorm.desktop"]

[icedos.desktop.gnome.clock]
date = true
weekday = true

[icedos.desktop.stylix]
enable = true
disabledTargets = ["console", "kmscon"]

[icedos.desktop.users.stef]
startupScript = "protonvpn-app & steam & signal-desktop"

[icedos.desktop.users.stef.idle.lock]
enable = false

[icedos.desktop.users.stef.idle.disableMonitors]
seconds = 300

[icedos.desktop.users.stef.idle.suspend]
enable = false

[icedos.desktop.users.work]
startupScript = "protonvpn-app & slack"

[icedos.desktop.users.work.idle.lock]
seconds = 300

[icedos.desktop.users.work.idle.disableMonitors]
seconds = 270

[icedos.desktop.users.work.idle.suspend]
enable = false

[icedos.desktop.windows]
maximizeButton = true
minimizeButton = true

[[icedos.repositories]]
url = "github:icedos/hardware"
modules = [
  "bluetooth",
  "disable-ipv6",
  "graphics",
  "kernel",
  "monitors",
  "mounts",
  "pipewire",
  "radeon",
  "ryzen",
  "systemd-boot",
  "uinput",
  "upower",
  "zram",
]

[icedos.hardware.bootloaders.systemd-boot]
mountPoint = "/boot"

[icedos.hardware.graphics.radeon]
featureMask = "0xffffffff"

[icedos.hardware.kernel]
variant = "latest"

[[icedos.hardware.mounts]]
path = "/"
device = "/dev/disk/by-uuid/875ba1fd-ae85-47ec-beac-ec515e776834"
fsType = "btrfs"
flags = ["compress=zstd", "nofail", "x-gvfs-show"]

[[icedos.hardware.mounts]]
path = "/mnt/Nvme"
device = "/dev/disk/by-uuid/ebcec57e-2afb-49a7-8ae8-d6776a841f52"
fsType = "btrfs"
flags = ["compress=zstd", "nofail", "x-gvfs-show"]

[[icedos.hardware.mounts]]
path = "/mnt/SSDGames"
device = "/dev/disk/by-uuid/bb93c901-8df3-4e23-8029-b1816a66ef58"
fsType = "btrfs"
flags = ["compress=zstd", "nofail", "x-gvfs-show"]

[[icedos.hardware.mounts]]
path = "/mnt/HDDGames"
device = "/dev/disk/by-uuid/e7e03cc8-e8fe-47e2-b48a-c6dbd1903112"
fsType = "btrfs"
flags = ["compress=zstd", "nofail", "x-gvfs-show"]

[icedos.hardware.network]
firewall = false

[icedos.hardware.pipewire.noiseCancellation]
enable = true
# true  = smart filter on the default mic (transparent, follows default source)
# false = separate virtual mic that apps must explicitly select
dynamic = true
# true  = 1-channel rnnoise (mono mics native; stereo mics downmixed to mono)
# false = 2-channel rnnoise (stereo mics preserved; mono mics upmixed, ~2x CPU)
mono = false
# How confident (%) rnnoise must be that a sound is speech before letting it through
vadThreshold = 90
# Ms to keep the gate open after speech stops, preventing abrupt mid-sentence cutoffs
vadGracePeriod = 400
# Ms of audio to retroactively restore when speech is detected, catching clipped first syllables
retroactiveVadGrace = 100

[[icedos.repositories]]
url = "github:icedos/tweaks"
modules = ["gaming", "kernel"]

