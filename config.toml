formatOnSave = true

[icedos.applications.zsh.aliases]
i = "icedos"
ir = "icedos rebuild"
iu = "icedos rebuild --update"

[[icedos.repositories]]
url = "github:icedos/desktop"

[icedos.desktop]
defaultBrowser = "helium.desktop"
defaultEditor = "dev.zed.Zed.desktop"
keyboardLayouts = [ "us", "gr" ]

[icedos.desktop.clock]
date = true
weekday = true

[[icedos.desktop.entries]]
id = "librewolf" # Firefox privacy flavor
name = "Librewolf"
exec = "icedos pkgs run librewolf"
icon = "librewolf"

[[icedos.desktop.entries]]
id = "mousai" # Song recognizer
name = "Mousai"
exec = "icedos pkgs run mousai"
icon = "mousai"

[[icedos.desktop.entries]]
id = "newsflash" # RSS reader
name = "Newsflash"
exec = "icedos pkgs run newsflash"
icon = "newsflash"

[[icedos.repositories]]
url = "github:icedos/kde"
# overrideUrl = "path:/home/stef/code/os/.repos/kde"
fetchOptionalDependencies = true

[icedos.desktop.kde]
excludeDefaultPackages = ["dolphin", "dolphin-plugins"]

[icedos.desktop.kde.keyboard]
switchingPolicy = "window"

[icedos.desktop.kde.panel]
autohide = true

[icedos.desktop.kde.panel.systemTray]
disabledApplets = [
  "org.kde.plasma.devicenotifier",
  "org.kde.plasma.mediacontroller"
]

[[icedos.desktop.kde.screenEdges]]
position = "topLeft"
action = "none"

[icedos.desktop.kde.shortcuts.hotkeys.kitty]
name = "Kitty"
command = "kitty"
keys = ["Meta+X", "Meta+Χ"]

[icedos.desktop.kde.shortcuts.hotkeys.nautilus]
name = "Nautilus"
command = "nautilus"
keys = ["Meta+E", "Meta+Ε"]

[icedos.desktop.stylix]
enable = true
disabledTargets = ["blender", "chromium", "console", "kmscon", "vencord", "zed"]

[icedos.desktop.users.stef]
startupScript = "protonvpn-app"

[icedos.desktop.users.stef.idle.lock]
enable = false

[icedos.desktop.users.stef.idle.disableMonitors]
seconds = 300

[icedos.desktop.users.stef.idle.suspend]
enable = false

[icedos.desktop.users.work.idle.lock]
seconds = 300

[icedos.desktop.users.work.idle.disableMonitors]
seconds = 270

[icedos.desktop.users.work.idle.suspend]
enable = false

[icedos.desktop.windows]
maximizeButton = true
minimizeButton = true

[icedos.desktop.xdgDesktopPortal]
forceGtkFilePicker = true

[[icedos.repositories]]
url = "github:icedos/hardware"
modules = [
  "bluetooth",
  "disable-ipv6",
  "graphics",
  "kernel",
  "monitors",
  "mounts",
  "pipewire",
  "radeon",
  "ryzen",
  "systemd-boot",
  "uinput",
  "upower",
  "zram",
]

[icedos.hardware.bootloaders.systemd-boot]
mountPoint = "/boot"

[icedos.hardware.graphics.radeon]
featureMask = "0xffffffff"

[icedos.hardware.kernel]
variant = "latest"

[[icedos.hardware.mounts]]
path = "/"
device = "/dev/disk/by-uuid/875ba1fd-ae85-47ec-beac-ec515e776834"
fsType = "btrfs"
flags = ["compress=zstd", "nofail", "x-gvfs-show"]

[[icedos.hardware.mounts]]
path = "/mnt/Nvme"
device = "/dev/disk/by-uuid/ebcec57e-2afb-49a7-8ae8-d6776a841f52"
fsType = "btrfs"
flags = ["compress=zstd", "nofail", "x-gvfs-show"]

[[icedos.hardware.mounts]]
path = "/mnt/SSDGames"
device = "/dev/disk/by-uuid/bb93c901-8df3-4e23-8029-b1816a66ef58"
fsType = "btrfs"
flags = ["compress=zstd", "nofail", "x-gvfs-show"]

[[icedos.hardware.mounts]]
path = "/mnt/HDD"
device = "/dev/disk/by-uuid/a8bdc116-6aac-4f2e-8422-fad546ecf5c0"
fsType = "xfs"
flags = ["nofail", "x-gvfs-show"]

[icedos.hardware.network]
firewall = false

[icedos.hardware.pipewire.echoCancellation]
enable = true

[icedos.hardware.pipewire.noiseCancellation]
enable = true
# true  = smart filter on the default mic (transparent, follows default source)
# false = separate virtual mic that apps must explicitly select
dynamic = true
# true  = 1-channel rnnoise (mono mics native; stereo mics downmixed to mono)
# false = 2-channel rnnoise (stereo mics preserved; mono mics upmixed, ~2x CPU)
mono = false
# How confident (%) rnnoise must be that a sound is speech before letting it through
vadThreshold = 90
# Ms to keep the gate open after speech stops, preventing abrupt mid-sentence cutoffs
vadGracePeriod = 400
# Ms of audio to retroactively restore when speech is detected, catching clipped first syllables
retroactiveVadGrace = 100

