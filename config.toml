# rotation = 0

[icedos.hardware.networking]
hostname = "giannisdesktop"
hosts = false
ipv6 = false

[icedos.system]
home = "/home"
swappiness = 1
version = "24.05" # Do not change without checking the docs (config.system.stateVersion)

[icedos.system.config]
version = "1.0.0"

[icedos.system.generations]
bootEntries = 30

[icedos.system.generations.garbageCollect]
automatic = true
days = 7 # Number of days before a generation can be deleted
generations = 5 # Number of generations that will always be kept
interval = "7d" # Format(https://www.freedesktop.org/software/systemd/man/latest/systemd.time.html)

[icedos.system.users.main]
enable = true
username = "giannis"
description = "Giannis"

[icedos.system.users.main.applications.codium]
autoSave = "onFocusChange" # off, afterDelay, onFocusChange, onWindowChange
formatOnSave = true
formatOnPaste = false

[icedos.system.users.main.applications.git]
username = "giannisgalleti"
email = "giannispapanatsios@yahoo.gr"

[icedos.system.users.main.applications.nvchad]
formatOnSave = true

[icedos.system.users.main.desktop.gnome.pinnedApps.arcmenu]
enable = true
list = [
  "codiumIDE.desktop",
  "org.duckstation.DuckStation.desktop",
  "PCSX2.desktop",
  "ppsspp.desktop",
  "rpcs3.desktop",
  "smartcode-stremio.desktop",
  "OpenRGB.desktop",
  "com.usebottles.bottles.desktop",
  "org.gnome.Nautilus.desktop",
  "io.github.lact-linux.desktop",
  "io.missioncenter.MissionCenter.desktop",
  "io.github.seadve.Mousai.desktop",
  "onlyoffice-desktopeditors.desktop",
  "org.gnome.Settings.desktop",
]

# Set pinned apps for gnome shell (will be used by dash-to-panel if enabled)
[icedos.system.users.main.desktop.gnome.pinnedApps.shell]
enable = true
list = [
  "steam.desktop",
  # "webcord.desktop",
  "signal-desktop.desktop",
  "librewolf.desktop",
]

[icedos.system.users.main.desktop.idle.lock]
enable = false
seconds = 180

[icedos.system.users.main.desktop.idle.disableMonitors]
enable = true
seconds = 3600

[icedos.system.users.main.desktop.idle.suspend]
enable = false
seconds = 900

